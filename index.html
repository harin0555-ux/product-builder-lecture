<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>

    <style>
        body {
            margin: 0;
            font-family: "맑은 고딕", sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 500px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #ff9800;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #f57c00;
        }

        #numbers {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ball {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            color: white;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 로또 번호 추천기</h1>
    <p>버튼을 누르면 추천 번호가 생성됩니다.</p>

    <button onclick="generateLotto()">
        번호 추천받기
    </button>

    <div id="numbers"></div>
</div>

<script>
function generateLotto() {

    const result = document.getElementById("numbers");
    result.innerHTML = "";

    // 5세트 생성
    for(let set = 1; set <= 5; set++) {

        let numbers = [];

        while(numbers.length < 6){
            let num = Math.floor(Math.random() * 45) + 1;

            if(!numbers.includes(num)){
                numbers.push(num);
            }
        }

        numbers.sort((a,b)=>a-b);

        // 한 세트를 담을 영역
        const line = document.createElement("div");
        line.style.margin = "20px 0";
        line.style.textAlign = "center";

        // 세트 제목
        const title = document.createElement("h3");
        title.textContent = "🎟️ " + set + "번째 추천";
        line.appendChild(title);

        // 번호 영역
        const ballBox = document.createElement("div");
        ballBox.style.display = "flex";
        ballBox.style.justifyContent = "center";
        ballBox.style.gap = "10px";
        ballBox.style.flexWrap = "wrap";

        numbers.forEach(num => {

            const ball = document.createElement("div");
            ball.className = "ball";

            if(num <= 10){
                ball.style.background = "#fbc400";
            }else if(num <= 20){
                ball.style.background = "#69c8f2";
            }else if(num <= 30){
                ball.style.background = "#ff7272";
            }else if(num <= 40){
                ball.style.background = "#999999";
            }else{
                ball.style.background = "#7ac74f";
            }

            ball.textContent = num;
            ballBox.appendChild(ball);
        });

        line.appendChild(ballBox);
        result.appendChild(line);
    }

}
</script>
</body>
</html>
